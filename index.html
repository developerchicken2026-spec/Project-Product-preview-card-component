<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <main class="container">
      <article class="container-card">
        <picture class="picture-img">
          <source
            media="(min-width: 600px)"
            srcset="./images/image-product-desktop.jpg"
          />
          <img
            src="./images/image-product-mobile.jpg"
            alt="image of product image-product-mobile"
            class="container-img"
          />
        </picture>
        <div class="container-div-card">
          <p class="container-p_1">PERFUME</p>
          <h1 class="container-h1">Gabrielle Essence Eau De Parfum</h1>
          <p class="container-p_2">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
          <div class="container-div-price">
            <p class="new-price">$149.99</p>
            <p class="old-price"><s>$169.99</s></p>
          </div>
          <button class="button">
            <img
              class="icon-button"
              src="./images/icon-cart.svg"
              alt="icon-button"
            />
            <span class="span-button">Add to Cart</span>
          </button>
        </div>
      </article>
    </main>
    <script src="script.js"></script>
  </body>
</html>
